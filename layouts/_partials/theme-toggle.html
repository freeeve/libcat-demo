{{- /*
  TEMPORARY shadow of the module's theme-toggle.html, carrying one fix (upstream
  tasks/122): the module interpolates `i18n ... | jsonify` inside <script> without
  safeJS, so html/template re-encodes the JSON as a JS string literal and the label
  renders with literal quotation marks ("Dark mode"). Identical to the module's
  partial except the two `| safeJS` below. DELETE this file when the module ships
  the fix (their tasks/122) -- this site otherwise shadows nothing (tasks/017).
*/ -}}
<button type="button" class="lcat-theme-toggle" id="lcat-theme-toggle" hidden
        aria-pressed="false">{{ i18n "darkMode" | default "Dark mode" }}</button>
<script>
  (function () {
    var btn = document.getElementById("lcat-theme-toggle");
    if (!btn) return;
    var root = document.documentElement;
    function dark() {
      var forced = root.getAttribute("data-lcat-theme");
      if (forced) return forced === "dark";
      return window.matchMedia && matchMedia("(prefers-color-scheme: dark)").matches;
    }
    function paint() {
      var d = dark();
      btn.setAttribute("aria-pressed", String(d));
      btn.textContent = d ? {{ i18n "lightMode" | default "Light mode" | jsonify | safeJS }} : {{ i18n "darkMode" | default "Dark mode" | jsonify | safeJS }};
    }
    btn.addEventListener("click", function () {
      var next = dark() ? "light" : "dark";
      root.setAttribute("data-lcat-theme", next);
      try { localStorage.setItem("lcat-theme", next); } catch (e) {}
      paint();
    });
    paint();
    btn.hidden = false;
  })();
</script>
